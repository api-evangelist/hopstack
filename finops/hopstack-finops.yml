meters:
- name: platform_subscription
  description: Negotiated Hopstack platform subscription; the primary invoiced cost.
  unit: contract
  aggregation: sum
  dimensions:
  - account
- name: warehouses
  description: Number of warehouses under management, a common scoping dimension for the subscription.
  unit: warehouses
  aggregation: sum
  dimensions:
  - account
- name: order_volume
  description: Order / fulfillment throughput processed, a likely commercial scaling dimension.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - warehouse
- name: client_accounts
  description: For 3PLs, the number of client accounts managed within Hopstack.
  unit: clients
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track subscription scope (warehouses, modules, client accounts) and order throughput against the negotiated agreement; API usage itself is not separately metered.
- name: Allocation
  description: For 3PLs, map warehouses and client accounts to internal cost centers or billed customers.
- name: Optimization
  description: Right-size enabled modules and warehouse scope to the operation; use pre-built integrations before commissioning custom API work to avoid engineering cost.
- name: Accountability
  description: Assign an owner for the Hopstack contract and review scope/volume against the agreement at renewal.
