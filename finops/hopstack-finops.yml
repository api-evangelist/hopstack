description: >-
  FinOps view of Hopstack spend. Hopstack is a quote-based SaaS WMS and
  fulfillment platform; cost is a negotiated subscription driven by warehouses,
  order/throughput volume, enabled modules, and 3PL client accounts rather than
  by metered per-API-call charges. The REST API is included as a platform
  capability (enabled by support) and is not separately invoiced, so API usage
  does not map to a distinct line item today. The dominant cost drivers are the
  platform subscription and the operational scope it covers.
notes: >-
  No public per-unit or per-call API rates exist to model; Cloud/API spend is
  bundled into the subscription. Reconcile actual commercial terms and any
  volume-based tiers with Hopstack sales.
