apis:
- aid: hopstack:hopstack-orders-api
  name: Hopstack Orders API
  tags:
  - Orders
  - Fulfillment
  - Order Management
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://apidocs.hopstack.io/reference
  properties:
  - url: https://apidocs.hopstack.io/reference
    type: APIReference
  - url: https://apidocs.hopstack.io/
    type: Documentation
  - url: https://help.hopstack.io/home/order-management-creating-an-order
    type: Documentation
  description: Programmatic access to sales/fulfillment orders - create and manage
    orders that flow into Hopstack's omnichannel order management and picking,
    packing, and shipping workflows. Orders is one of the core resources Hopstack
    documents as available through its REST API. Exact endpoint paths and base URL
    are published in the account-gated API reference; endpoints modeled here from
    the public reference and knowledge base.
- aid: hopstack:hopstack-consignments-api
  name: Hopstack Consignments API
  tags:
  - Consignments
  - Inbound
  - Receiving
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://apidocs.hopstack.io/reference
  properties:
  - url: https://apidocs.hopstack.io/reference
    type: APIReference
  - url: https://apidocs.hopstack.io/
    type: Documentation
  - url: https://help.hopstack.io/home/new-design-creating-a-consignment
    type: Documentation
  description: Programmatic access to consignments - the inbound/receiving records
    that bring stock into a Hopstack-managed warehouse. Consignments is explicitly
    called out alongside orders as a core resource exposed through the Hopstack
    REST API. Full request/response schemas live in the account-gated reference;
    endpoints modeled here from the public reference and knowledge base.
