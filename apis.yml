aid: hopstack
url: https://raw.githubusercontent.com/api-evangelist/hopstack/refs/heads/main/apis.yml
name: Hopstack
kind: company
description: Hopstack is an AI-native, cloud-based warehouse management system (WMS)
  and fulfillment operations platform that helps warehouses, 3PLs, and e-commerce
  operators optimize inbound logistics, inventory, order processing, picking,
  packing, shipping, and returns across channels. Hopstack exposes a documented
  RESTful API (referenced at apidocs.hopstack.io) for programmatic access to core
  resources such as orders and consignments, secured with a per-user X-API-Key
  generated from the Hopstack Dashboard. API access is gated - a customer must
  contact Hopstack Support to enable API-key generation in the UI - and the full
  endpoint surface, base URL, and machine-readable specification are published
  behind that account/partner reference rather than as a fully open catalog.
